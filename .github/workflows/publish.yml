name: Export and Publish Modpack

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Go setup (replaces Alpine container entirely) ─────────────────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      # ── Cache packwiz ──────────────────────────────────────────────────────
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: go-mod-${{ runner.os }}-${{ hashFiles('**/go.sum') }}

      - name: Install packwiz
        run: go install github.com/packwiz/packwiz@latest

      - name: Refresh pack index
        run: packwiz refresh

      - name: Export Modrinth pack
        run: packwiz modrinth export

      # ── Build site ────────────────────────────────────────────────────────
      - name: Prepare site directory
        run: |
          mkdir -p _site
          cp *.mrpack _site/

          MRPACK=$(ls -1 *.mrpack | head -n1)

          cat > _site/index.html <<EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Modpack Download</title>
            <style>
              body {
                font-family: sans-serif;
                max-width: 600px;
                margin: 4rem auto;
                padding: 0 1rem;
              }
              a {
                color: #1d7f3a;
                font-weight: bold;
              }
            </style>
          </head>
          <body>
            <h1>Modpack Download</h1>
            <p>
              Latest export:
              <a href="${MRPACK}">${MRPACK}</a>
            </p>
            <p>
              Built from commit <code>${GITHUB_SHA}</code>
            </p>
          </body>
          </html>
          EOF

      # ── Upload Pages artifact ─────────────────────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4