name: Export and Publish Modpack

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time, but don't cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: golang:alpine
    steps:
      - name: Install system dependencies
        # git    - required by actions/checkout inside a container
        # nodejs - required by all actions/* toolkit actions
        run: apk add --no-cache git nodejs

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install packwiz
        run: go install github.com/packwiz/packwiz@latest

      - name: Refresh pack index
        run: packwiz refresh

      - name: Export Modrinth pack
        run: packwiz modrinth export

      - name: Prepare site directory
        run: |
          mkdir -p _site
          cp *.mrpack _site/
          MRPACK=$(ls *.mrpack | head -n1)
          cat > _site/index.html <<EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Modpack Download</title>
            <style>
              body { font-family: sans-serif; max-width: 600px; margin: 4rem auto; padding: 0 1rem; }
              a { color: #1d7f3a; font-weight: bold; }
            </style>
          </head>
          <body>
            <h1>Modpack Download</h1>
            <p>Latest export: <a href="${MRPACK}">${MRPACK}</a></p>
            <p>Built from commit <code>${GITHUB_SHA}</code></p>
          </body>
          </html>
          EOF

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mrpack-site
          path: _site/
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: mrpack-site
          path: _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
