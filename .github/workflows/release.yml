name: Release Modpack

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ─── Build ────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Use official Go setup (faster + cached)
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      # Cache packwiz + modules
      - name: Cache Go + packwiz
        uses: actions/cache@v4
        id: cache-packwiz
        with:
          path: |
            ~/go/bin/packwiz
            ~/go/pkg/mod
          key: packwiz-${{ runner.os }}-${{ hashFiles('**/go.sum') }}

      - name: Install packwiz
        if: steps.cache-packwiz.outputs.cache-hit != 'true'
        run: go install github.com/packwiz/packwiz@latest

      - name: Refresh pack index
        run: packwiz refresh

      - name: Export modpack
        run: packwiz modrinth export

      # Upload artifact (no filename parsing needed)
      - name: Upload mrpack artifact
        uses: actions/upload-artifact@v4
        with:
          name: mrpack
          path: "*.mrpack"
          retention-days: 1

      # ── Generate landing page ─────────────────────────────────────────────
      - name: Generate index.html
        run: |
          PACK_NAME=$(grep -m1 '^name' pack.toml | sed 's/^name *= *"\(.*\)"/\1/')
          PACK_VER=$(grep -m1 '^version' pack.toml | sed 's/^version *= *"\(.*\)"/\1/')
          AUTHOR=$(grep -m1 '^author' pack.toml | sed 's/^author *= *"\(.*\)"/\1/')
          MC_VER=$(grep -m1 'minecraft' pack.toml | sed 's/.*= *"\(.*\)"/\1/')

          LOADER="Unknown"
          for l in fabric forge quilt neoforge; do
            if grep -qE "^${l} *= *\"" pack.toml; then
              case $l in
                fabric) LOADER="Fabric" ;;
                forge) LOADER="Forge" ;;
                quilt) LOADER="Quilt" ;;
                neoforge) LOADER="NeoForge" ;;
              esac
              break
            fi
          done

          MRPACK=$(ls -1 *.mrpack | head -n1)
          TAG="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"
          DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${TAG}/${MRPACK}"

          cat > index.html << HTML
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>${PACK_NAME}</title>
          </head>
          <body>
            <h1>${PACK_NAME}</h1>
            <p>Version: ${PACK_VER}</p>
            <p>Minecraft: ${MC_VER}</p>
            <p>Loader: ${LOADER}</p>
            <p><a href="${DOWNLOAD_URL}">Download</a></p>
          </body>
          </html>
          HTML

      # ── Prepare Pages ─────────────────────────────────────────────────────
      - name: Prepare site directory
        run: |
          mkdir -p _site
          rsync -a --exclude-from=.packwizignore --exclude=_site/ . _site/
          mv index.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  # ─── Release ──────────────────────────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download mrpack artifact
        uses: actions/download-artifact@v4
        with:
          name: mrpack

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.mrpack"
          generate_release_notes: true

  # ─── Deploy ───────────────────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4