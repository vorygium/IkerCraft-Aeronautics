name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      # Resolve the actual version behind @latest
      - name: Resolve packwiz version
        id: packwiz-version
        run: |
          echo "version=$(go list -m -f '{{.Version}}' github.com/packwiz/packwiz@latest)" >> $GITHUB_OUTPUT

      # Cache only the built binary using resolved version
      - name: Cache packwiz binary
        uses: actions/cache@v4
        id: cache-packwiz
        with:
          path: ~/go/bin/packwiz
          key: packwiz-${{ runner.os }}-${{ steps.packwiz-version.outputs.version }}

      - name: Install packwiz
        if: steps.cache-packwiz.outputs.cache-hit != 'true'
        run: go install github.com/packwiz/packwiz@latest

      - name: Refresh pack index
        run: packwiz refresh

      - name: Export mrpack
        run: packwiz modrinth export

      - name: Get tag name
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: |
            *.mrpack
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Only deploy the built artifacts instead of the whole repo
      - name: Prepare Pages content
        run: |
          mkdir public
          cp *.mrpack public/

      - name: Deploy pack to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: false